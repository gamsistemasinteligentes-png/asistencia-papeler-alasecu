<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asistencia La Secu - Final</title>
    <style>
        :root { --primary: #1d3557; --success: #25D366; --error: #e63946; --bg: #f0f2f5; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { background: white; width: 100%; max-width: 400px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 30px 20px; text-align: center; }
        .content { padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        #geo-lock { padding: 20px; border-radius: 12px; text-align: center; font-weight: bold; background: #eee; border: 2px solid #ddd; font-size: 0.9rem; }
        .valid { background: #d4edda !important; color: #155724 !important; border-color: #c3e6cb !important; }
        #main-form { display: none; flex-direction: column; gap: 15px; }
        select, textarea { padding: 16px; border-radius: 12px; border: 2px solid #ddd; font-size: 1rem; width: 100%; -webkit-appearance: none; font-family: inherit; }
        .btn { padding: 18px; border-radius: 12px; border: none; font-size: 1.1rem; font-weight: bold; color: white; cursor: pointer; }
        .btn-gps { background: var(--primary); margin-bottom: 10px; }
        .btn-success { background: var(--success); }
        .btn-error { background: var(--error); }
        
        /* ESTO SOLUCIONA LO QUE ME PIDES */
        #obs-area { display: none; flex-direction: column; gap: 10px; margin-top: 10px; border-top: 2px solid #eee; padding-top: 15px; }
        label { font-weight: bold; font-size: 0.8rem; color: var(--primary); text-transform: uppercase; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Papelería La Secu</h1>
        <p>Control de Asistencia</p>
    </div>

    <div class="content">
        <button id="btnStart" class="btn btn-gps" onclick="activarSensor()">1. ACTIVAR SENSOR GPS</button>

        <div id="geo-lock">
            🛰️ SENSOR APAGADO<br>
            <span style="font-size: 0.7rem; font-weight: normal;">Toca el botón azul para validar.</span>
        </div>

        <div id="main-form">
            <label>¿Quién realiza el registro?</label>
            <select id="employee">
                <option value="">-- Selecciona tu nombre --</option>
                <option value="Empleado 1">Empleado 1</option>
                <option value="Empleado 2">Empleado 2</option>
                <option value="Empleado 3">Empleado 3</option>
            </select>

            <div id="action-btns" style="display: flex; flex-direction: column; gap: 10px;">
                <button class="btn btn-success" onclick="registrar('ENTRADA')">REGISTRAR ENTRADA</button>
                <button class="btn btn-error" onclick="abrirObs()">REGISTRAR SALIDA</button>
            </div>

            <div id="obs-area">
                <label>Escribe tus Observaciones:</label>
                <textarea id="txtObs" rows="3" placeholder="Ej. Todo en orden, falta material, etc..."></textarea>
                <button class="btn btn-error" onclick="registrar('SALIDA')">ENVIAR REPORTE DE SALIDA</button>
                <button style="background:none; border:none; color:gray; text-decoration:underline; font-size:0.8rem;" onclick="cancelarSalida()">Volver</button>
            </div>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        lat: 18.906744582104, 
        lon: -103.868403104, 
        rango: 120, // Metros de tolerancia
        tel: "523339019091"
    };

    function activarSensor() {
        document.getElementById('btnStart').style.display = "none";
        document.getElementById('geo-lock').innerHTML = "🛰️ BUSCANDO UBICACIÓN...";
        navigator.geolocation.watchPosition(verificar, error, {
            enableHighAccuracy: true, timeout: 10000, maximumAge: 0
        });
    }

    function verificar(pos) {
        const dist = calcDist(pos.coords.latitude, pos.coords.longitude, CONFIG.lat, CONFIG.lon);
        const lock = document.getElementById('geo-lock');
        const form = document.getElementById('main-form');
        if (dist <= CONFIG.rango) {
            lock.innerHTML = `✅ UBICACIÓN VALIDADA (${Math.round(dist)}m)`;
            lock.className = "valid";
            form.style.display = "flex";
        } else {
            lock.innerHTML = `📍 FUERA DE RANGO (${Math.round(dist)}m)`;
            lock.className = "";
            form.style.display = "none";
        }
    }

    function error() { document.getElementById('geo-lock').innerHTML = "⚠️ ERROR GPS: Activa tu ubicación."; }

    function calcDist(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = (lat2-lat1) * Math.PI/180;
        const dLon = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // MOSTRAR CAMPO DE OBSERVACIONES
    function abrirObs() {
        const emp = document.getElementById('employee').value;
        if(!emp) return alert("Por favor selecciona tu nombre.");
        document.getElementById('action-btns').style.display = "none";
        document.getElementById('obs-area').style.display = "flex";
    }

    function cancelarSalida() {
        document.getElementById('action-btns').style.display = "flex";
        document.getElementById('obs-area').style.display = "none";
    }

    function registrar(tipo) {
        const emp = document.getElementById('employee').value;
        if(!emp) return alert("Elige tu nombre");

        const ahora = new Date();
        const hora = ahora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const fecha = ahora.toLocaleDateString();
        const obs = document.getElementById('txtObs').value || "Sin novedades";

        // CONSTRUCCIÓN DEL MENSAJE PARA WHATSAPP
        let msg = `📍 *REGISTRO LA SECU*\n\n`;
        msg += `👤 *Empleado:* ${emp}\n`;
        msg += `🔘 *Movimiento:* ${tipo}\n`;
        msg += `🕒 *Hora:* ${hora}\n`;
        msg += `📅 *Fecha:* ${fecha}\n`;
        
        if(tipo === 'SALIDA') {
            msg += `📝 *Observaciones:* ${obs}\n`;
        }
        
        msg += `\n✅ *Validado por Satélite.*`;

        window.location.href = `https://wa.me/${CONFIG.tel}?text=${encodeURIComponent(msg)}`;
    }
</script>
</body>
</html>
