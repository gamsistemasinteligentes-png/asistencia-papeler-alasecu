<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control La Secu</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Asistencia">

    <style>
        :root { --primary: #1d3557; --success: #25D366; --error: #e63946; --bg: #f0f2f5; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .app-container { background: white; width: 100%; max-width: 400px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 30px 15px; text-align: center; }
        .content { padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        
        #offline-notice { background: #ff9500; color: white; width: 100%; text-align: center; font-size: 0.7rem; padding: 6px; display: none; border-radius: 8px; margin-bottom: 10px; font-weight: bold; }

        #geo-lock { padding: 18px; border-radius: 15px; text-align: center; font-weight: bold; background: #f8f9fa; border: 2px dashed #ccc; color: #666; transition: 0.3s; }
        .valid { background: #d4edda !important; color: #155724 !important; border: 2px solid #25D366 !important; }
        
        #main-form { display: none; flex-direction: column; gap: 15px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        label { font-size: 0.75rem; font-weight: bold; color: var(--primary); margin-left: 5px; }
        select, textarea { padding: 18px; border-radius: 15px; border: 2px solid #eee; font-size: 1rem; width: 100%; background: #fdfdfd; outline: none; transition: 0.2s; }
        select:focus { border-color: var(--primary); }

        .btn { padding: 20px; border-radius: 18px; border: none; font-size: 1.1rem; font-weight: bold; color: white; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn:active { transform: scale(0.96); }
        .btn-gps { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn-error { background: var(--error); }
        
        #obs-area { display: none; flex-direction: column; gap: 12px; margin-top: 10px; border-top: 2px solid #f5f5f5; padding-top: 20px; }
        
        .history-container { width: 100%; max-width: 400px; margin-top: 25px; }
        .log-card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .log-name { font-weight: bold; font-size: 0.95rem; display: block; }
        .log-meta { font-size: 0.75rem; color: #888; }
        .type-tag { font-size: 0.7rem; font-weight: 800; padding: 5px 10px; border-radius: 8px; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="offline-notice">⚠️ TRABAJANDO EN MODO OFFLINE</div>

<div class="app-container">
    <div class="header">
        <h1 style="margin:0; font-size:1.4rem; letter-spacing: 1px;">PAPELERÍA LA SECU</h1>
        <p style="margin:5px 0 0; font-size:0.85rem; opacity:0.8;">Control de Asistencia</p>
    </div>

    <div class="content">
        <button id="btnStart" class="btn btn-gps" onclick="activarSensor()">🔓 VALIDAR UBICACIÓN</button>
        <div id="geo-lock">SISTEMA BLOQUEADO POR GPS</div>

        <div id="main-form">
            <div>
                <label>NOMBRE DEL EMPLEADO</label>
                <select id="employee">
                    <option value="">-- ¿Quién eres? --</option>
                    <option value="Empleado 1">Empleado 1</option>
                    <option value="Empleado 2">Empleado 2</option>
                    <option value="Empleado 3">Empleado 3</option>
                </select>
            </div>

            <div id="action-btns" style="display:flex; flex-direction:column; gap:12px;">
                <button class="btn btn-success" onclick="registrar('ENTRADA')">REGISTRAR ENTRADA</button>
                <button class="btn btn-error" onclick="abrirObs()">REGISTRAR SALIDA</button>
            </div>

            <div id="obs-area">
                <label>OBSERVACIONES DE SALIDA</label>
                <textarea id="txtObs" rows="3" placeholder="Ej. Todo en orden, recibí mercancía..."></textarea>
                <button class="btn btn-error" onclick="registrar('SALIDA')">CONFIRMAR Y ENVIAR</button>
                <button onclick="location.reload()" style="background:none; border:none; color:#888; text-decoration:underline; font-size:0.8rem; margin-top:10px;">Cancelar</button>
            </div>
        </div>
    </div>
</div>

<div id="history-list" class="history-container"></div>

<script>
    const CONFIG = { 
        lat: 18.906744582104, 
        lon: -103.868403104, 
        rango: 150, 
        tel: "523339019091" 
    };

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').then(reg => {
            reg.onupdatefound = () => {
                const worker = reg.installing;
                worker.onstatechange = () => {
                    if (worker.state === 'installed' && navigator.serviceWorker.controller) location.reload();
                };
            };
        });
    }

    window.addEventListener('offline', () => document.getElementById('offline-notice').style.display = 'block');
    window.addEventListener('online', () => document.getElementById('offline-notice').style.display = 'none');

    function activarSensor() {
        const lock = document.getElementById('geo-lock');
        lock.innerHTML = "📡 CONECTANDO SATÉLITES...";
        
        const options = { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 };

        navigator.geolocation.watchPosition(verificar, (err) => {
            lock.innerHTML = "❌ GPS NO DETECTADO";
            alert("Por favor, permite el acceso a la ubicación.");
        }, options);
    }

    function verificar(pos) {
        const d = calcDist(pos.coords.latitude, pos.coords.longitude, CONFIG.lat, CONFIG.lon);
        const lock = document.getElementById('geo-lock');
        const form = document.getElementById('main-form');
        document.getElementById('btnStart').style.display = "none";

        if (d <= CONFIG.rango) {
            lock.innerHTML = `✅ EN EL NEGOCIO (${Math.round(d)}m)`;
            lock.className = "valid";
            form.style.display = "flex";
        } else {
            lock.innerHTML = `📍 FUERA DE RANGO (${Math.round(d)}m)`;
            lock.className = "";
            form.style.display = "none";
        }
    }

    function calcDist(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = (lat2-lat1) * Math.PI/180;
        const dLon = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function abrirObs() {
        if(!document.getElementById('employee').value) return alert("Selecciona tu nombre primero");
        document.getElementById('action-btns').style.display = "none";
        document.getElementById('obs-area').style.display = "flex";
    }

    function registrar(tipo) {
        const emp = document.getElementById('employee').value;
        const ahora = new Date();
        const hora = ahora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const fecha = ahora.toLocaleDateString('es-MX', {day:'2-digit', month:'short'});
        const ts = ahora.getTime();
        const obs = document.getElementById('txtObs').value || "Sin observaciones";

        let logs = JSON.parse(localStorage.getItem('secu_vFinal')) || [];
        logs.unshift({ emp, tipo, hora, fecha, ts });
        localStorage.setItem('secu_vFinal', JSON.stringify(logs.slice(0,30))); // Guardar últimos 30
        renderHistory();

        let msg = `🏢 *LA SECU - ASISTENCIA*\n\n👤 *${emp}*\n🔘 *MOVIMIENTO:* ${tipo}\n🕒 *HORA:* ${hora}\n📅 *FECHA:* ${fecha}\n`;
        if(tipo === 'SALIDA') msg += `📝 *OBS:* ${obs}\n`;
        msg += `\n✅ _Validado en sitio via GPS_`;

        window.location.href = `https://wa.me/${CONFIG.tel}?text=${encodeURIComponent(msg)}`;
    }

    function renderHistory() {
        const logs = JSON.parse(localStorage.getItem('secu_vFinal')) || [];
        const unMes = 30 * 24 * 60 * 60 * 1000;
        const ahora = new Date().getTime();
        
        const filtrados = logs.filter(l => (ahora - l.ts) < unMes);
        document.getElementById('history-list').innerHTML = filtrados.map(l => `
            <div class="log-card">
                <div>
                    <span class="log-name">${l.emp}</span>
                    <span class="log-meta">${l.fecha} | ${l.hora}</span>
                </div>
                <span class="type-tag" style="color:${l.tipo=='ENTRADA'?'#25D366':'#e63946'}">${l.tipo}</span>
            </div>
        `).join('');
    }
    renderHistory();
</script>
</body>
</html>
