<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asistencia La Secu - Offline Ready</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/1d3557/ffffff?text=Secu">
    
    <style>
        :root { --primary: #1d3557; --success: #25D366; --error: #e63946; --bg: #f0f2f5; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .app-container { background: white; width: 100%; max-width: 400px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 20px; }
        .header { background: var(--primary); color: white; padding: 30px 20px; text-align: center; }
        .content { padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        
        /* Indicador Offline */
        #offline-tag { display: none; background: #FF9500; color: white; font-size: 0.7rem; padding: 4px; text-align: center; font-weight: bold; }

        #geo-lock { padding: 15px; border-radius: 12px; text-align: center; font-weight: bold; background: #eee; border: 2px solid #ddd; font-size: 0.9rem; }
        .valid { background: #d4edda !important; color: #155724 !important; border-color: #c3e6cb !important; }
        #main-form { display: none; flex-direction: column; gap: 15px; }
        select, textarea { padding: 16px; border-radius: 12px; border: 2px solid #ddd; font-size: 1rem; width: 100%; -webkit-appearance: none; font-family: inherit; }
        .btn { padding: 18px; border-radius: 12px; border: none; font-size: 1.1rem; font-weight: bold; color: white; cursor: pointer; }
        .btn-gps { background: var(--primary); width: 100%; }
        .btn-success { background: var(--success); }
        .btn-error { background: var(--error); }
        #obs-area { display: none; flex-direction: column; gap: 10px; margin-top: 10px; border-top: 2px solid #eee; padding-top: 15px; }
        
        .history-container { width: 100%; max-width: 400px; padding: 10px; }
        .history-title { font-size: 0.8rem; font-weight: bold; color: #666; margin-bottom: 10px; text-transform: uppercase; }
        .log-card { background: white; padding: 12px; border-radius: 12px; margin-bottom: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--primary); }
        .log-info { display: flex; flex-direction: column; }
        .log-name { font-weight: bold; font-size: 0.9rem; }
        .log-date { font-size: 0.75rem; color: #888; }
        .log-type { font-size: 0.7rem; font-weight: bold; padding: 3px 8px; border-radius: 5px; color: white; text-align: center; }
    </style>
</head>
<body>

<div id="offline-tag">MODO SIN CONEXIÓN - Los registros se sincronizarán al recuperar señal</div>

<div class="app-container">
    <div class="header">
        <h1>Papelería La Secu</h1>
        <p>Asistencia Offline V2.0</p>
    </div>

    <div class="content">
        <button id="btnStart" class="btn btn-gps" onclick="activarSensor()">1. ACTIVAR GPS</button>
        <div id="geo-lock">🛰️ SENSOR APAGADO</div>

        <div id="main-form">
            <select id="employee">
                <option value="">-- Selecciona tu nombre --</option>
                <option value="Empleado 1">Empleado 1</option>
                <option value="Empleado 2">Empleado 2</option>
                <option value="Empleado 3">Empleado 3</option>
            </select>

            <div id="action-btns" style="display: flex; flex-direction: column; gap: 10px;">
                <button class="btn btn-success" onclick="registrar('ENTRADA')">REGISTRAR ENTRADA</button>
                <button class="btn btn-error" onclick="abrirObs()">REGISTRAR SALIDA</button>
            </div>

            <div id="obs-area">
                <textarea id="txtObs" rows="3" placeholder="Observaciones de salida..."></textarea>
                <button class="btn btn-error" onclick="registrar('SALIDA')">ENVIAR Y GUARDAR</button>
            </div>
        </div>
    </div>
</div>

<div class="history-container">
    <div class="history-title">Mis registros recientes (30 días)</div>
    <div id="history-list"></div>
</div>

<script>
    const CONFIG = {
        lat: 18.906744582104, 
        lon: -103.868403104, 
        rango: 120,
        tel: "523339019091"
    };

    // REGISTRO DEL SERVICE WORKER (Para Offline)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js');
        });
    }

    // Detectar estado de internet
    window.addEventListener('online', () => document.getElementById('offline-tag').style.display = 'none');
    window.addEventListener('offline', () => document.getElementById('offline-tag').style.display = 'block');

    window.onload = () => {
        if(!navigator.onLine) document.getElementById('offline-tag').style.display = 'block';
        limpiarRegistrosViejos();
        mostrarHistorial();
    };

    function activarSensor() {
        document.getElementById('btnStart').style.display = "none";
        document.getElementById('geo-lock').innerHTML = "🛰️ BUSCANDO UBICACIÓN...";
        navigator.geolocation.watchPosition(verificar, error, { 
            enableHighAccuracy: true,
            maximumAge: 0 
        });
    }

    function verificar(pos) {
        const dist = calcDist(pos.coords.latitude, pos.coords.longitude, CONFIG.lat, CONFIG.lon);
        const lock = document.getElementById('geo-lock');
        const form = document.getElementById('main-form');
        if (dist <= CONFIG.rango) {
            lock.innerHTML = `✅ UBICACIÓN OK (${Math.round(dist)}m)`;
            lock.className = "valid";
            form.style.display = "flex";
        } else {
            lock.innerHTML = `📍 FUERA DE RANGO (${Math.round(dist)}m)`;
            lock.className = "";
            form.style.display = "none";
        }
    }

    function error() { document.getElementById('geo-lock').innerHTML = "⚠️ Activa el GPS."; }

    function calcDist(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = (lat2-lat1) * Math.PI/180;
        const dLon = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function abrirObs() {
        if(!document.getElementById('employee').value) return alert("Elige tu nombre");
        document.getElementById('action-btns').style.display = "none";
        document.getElementById('obs-area').style.display = "flex";
    }

    function registrar(tipo) {
        const emp = document.getElementById('employee').value;
        if(!emp) return alert("Elige tu nombre");

        const ahora = new Date();
        const hora = ahora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const fecha = ahora.toLocaleDateString();
        const timestamp = ahora.getTime();
        const obs = document.getElementById('txtObs').value || "Sin notas";

        const nuevoRegistro = { emp, tipo, hora, fecha, timestamp };
        let historial = JSON.parse(localStorage.getItem('asistencia_secu')) || [];
        historial.unshift(nuevoRegistro);
        localStorage.setItem('asistencia_secu', JSON.stringify(historial));

        mostrarHistorial();

        let msg = `📍 *REGISTRO LA SECU*\n👤 *${emp}*\n🔘 *${tipo}*\n🕒 *${hora}*\n📅 *${fecha}*\n`;
        if(tipo === 'SALIDA') msg += `📝 *Obs:* ${obs}\n`;
        msg += `\n✅ *Validado Offline / GPS.*`;

        // Intentar WhatsApp (si no hay red, se queda en la cola del cel)
        window.location.href = `https://wa.me/${CONFIG.tel}?text=${encodeURIComponent(msg)}`;
    }

    function mostrarHistorial() {
        const historial = JSON.parse(localStorage.getItem('asistencia_secu')) || [];
        const lista = document.getElementById('history-list');
        lista.innerHTML = historial.length === 0 ? '<p style="color:gray; font-size:0.8rem">Sin registros recientes.</p>' : '';
        historial.forEach(reg => {
            const color = reg.tipo === 'ENTRADA' ? '#25D366' : '#e63946';
            lista.innerHTML += `<div class="log-card"><div class="log-info"><span class="log-name">${reg.emp}</span><span class="log-date">${reg.fecha} - ${reg.hora}</span></div><div class="log-type" style="background:${color}">${reg.tipo}</div></div>`;
        });
    }

    function limpiarRegistrosViejos() {
        let historial = JSON.parse(localStorage.getItem('asistencia_secu')) || [];
        const unMesAtras = new Date().getTime() - (30 * 24 * 60 * 60 * 1000);
        const historialNuevo = historial.filter(reg => reg.timestamp > unMesAtras);
        localStorage.setItem('asistencia_secu', JSON.stringify(historialNuevo));
    }
</script>
</body>
</html>
